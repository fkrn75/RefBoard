<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RefBoard</title>
    <!-- 노트 글꼴용 한글 웹폰트(글꼴 드롭다운). 로드 실패 시 generic 폴백으로 표시. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&family=Nanum+Myeongjo&family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: var(--rb-app-bg, #1e1e1e); }
      #app { position: fixed; inset: 0; }
      /* 빈 캔버스 안내 (이미지가 들어오면 숨김) */
      #hint {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        color: var(--rb-text-dim, #777); font: 14px system-ui, sans-serif; pointer-events: none; user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hint">이미지를 이 창에 끌어다 놓으세요 &nbsp;·&nbsp; 휠 = 줌 &nbsp;·&nbsp; 우클릭 드래그 = 이동 &nbsp;·&nbsp; Ctrl+V = 붙여넣기</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
